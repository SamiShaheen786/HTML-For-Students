<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>07 - Basic Table</title>
  </head>
  <body>

    <h1>HTML Tables</h1>
    <p>Today I am going to learn about HTML Tables</p>

    <!-- Basic Table Structure -->
    <!-- table = the whole table -->
    <!-- tr    = table row -->
    <!-- th    = table header cell (bold, centered by default) -->
    <!-- td    = table data cell -->

    <h2>Basic Table</h2>
    <table border="1">

      <!-- First Row (Header Row) -->
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Height</th>
        <th>Gender</th>
      </tr>

      <!-- Second Row -->
      <tr>
        <td>Sami</td>
        <td>21</td>
        <td>5.3</td>
        <td>Male</td>
      </tr>

      <!-- Third Row (missing Gender cell - browser leaves it empty) -->
      <tr>
        <td>Saad</td>
        <td>22</td>
        <td>5.5</td>
        <!-- Notice: no Gender td here - the cell will be empty -->
      </tr>

      <!-- Fourth Row -->
      <tr>
        <td>Ali</td>
        <td>23</td>
        <td>6</td>
        <td>Male</td>
      </tr>

    </table>

    <br />
    <hr />

    <!-- thead, tbody, tfoot: Sections of a Table -->
    <h2>Table with thead, tbody, tfoot</h2>
    <table border="1">

      <thead>
        <!-- thead = header section of table -->
        <tr>
          <th>Subject</th>
          <th>Marks</th>
          <th>Grade</th>
        </tr>
      </thead>

      <tbody>
        <!-- tbody = main data section -->
        <tr>
          <td>Mathematics</td>
          <td>92</td>
          <td>A</td>
        </tr>
        <tr>
          <td>Science</td>
          <td>85</td>
          <td>B+</td>
        </tr>
        <tr>
          <td>English</td>
          <td>78</td>
          <td>B</td>
        </tr>
      </tbody>

      <tfoot>
        <!-- tfoot = footer section (usually for totals/summaries) -->
        <tr>
          <td>Total Average</td>
          <td>85</td>
          <td>B+</td>
        </tr>
      </tfoot>

    </table>

  </body>
</html>
