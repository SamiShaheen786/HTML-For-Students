<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Comments</title>
  </head>
  <body>

    <h1>HTML Comments</h1>

    <!-- This is a single-line comment. The browser ignores it. -->
    <!-- Comments do NOT appear on the webpage. -->
    <!-- But you CAN see them in View Page Source (Ctrl+U) -->

    <p>This paragraph is visible on the page.</p>

    <!-- <p>This paragraph is commented out so it will NOT appear.</p> -->

    <!--
      This is a
      multi-line comment.
      You can write as many lines as you want.
      Use this to explain sections of your code.
    -->

    <h2>When to Use Comments</h2>
    <p>1. To explain what your code does.</p>
    <p>2. To temporarily hide code without deleting it.</p>
    <p>3. To leave notes for yourself or your team.</p>

    <!-- TIP: Right-click on this page and click "View Page Source" to see these comments -->

  </body>
</html>
