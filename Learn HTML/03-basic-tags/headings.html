<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Headings</title>
  </head>
  <body>

    <!-- HTML has 6 levels of headings: h1 to h6 -->
    <!-- h1 is the biggest, h6 is the smallest -->
    <!-- Use only ONE h1 per page (it is the main title) -->

    <h1>Heading 1 - Main Title of the Page</h1>
    <h2>Heading 2 - Section Title</h2>
    <h3>Heading 3 - Sub Section</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6 - Smallest Heading</h6>

    <hr />

    <!-- IMPORTANT: Use headings for structure, not just to make text big -->
    <!-- Wrong: using h3 just because you like its size -->
    <!-- Right:  using h3 because it is a sub-section under an h2 -->

  </body>
</html>
