<!DOCTYPE html>
<!-- DOCTYPE tells the browser: this is an HTML5 document -->

<html lang="en">
<!-- html is the ROOT element. lang="en" means the page language is English -->

  <head>
    <!-- HEAD section: not visible on page, but important for browser & SEO -->

    <meta charset="UTF-8" />
    <!-- charset=UTF-8 supports all languages and special characters -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- viewport makes the page responsive on mobile screens -->

    <title>02 - Basic HTML Structure</title>
    <!-- title shows in the browser tab -->

  </head>

  <body>
    <!-- BODY section: everything visible goes here -->

    <h1>This is the Page Heading</h1>

    <p>This text is inside the body tag, so it appears on the page.</p>

    <p>
      The head tag content (title, meta) does NOT appear here,
      but the browser reads it.
    </p>

  </body>

</html>
