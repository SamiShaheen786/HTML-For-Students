<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>08 - Basic Form</title>
  </head>
  <body>

    <h1>Personal Details</h1>

    <!-- form tag: action = where data goes, method = how data is sent -->
    <!-- method="GET"  = data appears in URL (for search, filters) -->
    <!-- method="POST" = data is hidden (for login, signup, sensitive data) -->

    <form action="#" method="GET">

      <div>
        <!-- label: the text shown to the user -->
        <!-- for="name" connects label to input with id="name" -->
        <label for="name">Enter Your Name:</label>
        <!-- input type="text" = single line text box -->
        <input type="text" id="name" name="name" placeholder="Your name" />
      </div>

      <br />

      <div>
        <label for="fname">Enter Your Father Name:</label>
        <input type="text" id="fname" name="fatherName" placeholder="Father name" />
      </div>

      <br />

      <div>
        <label for="number">Enter Your Age:</label>
        <input type="number" id="number" name="age" placeholder="Age" />
      </div>

      <br />

      <!-- Radio buttons: user picks ONE option from a group -->
      <!-- All radio buttons in a group must have the SAME name -->
      <div>
        Gender:
        <input type="radio" id="m" name="gender" value="Male" />
        <label for="m">Male</label>

        <input type="radio" id="fm" name="gender" value="Female" />
        <label for="fm">Female</label>
      </div>

      <br />

      <!-- Checkboxes: user can pick MULTIPLE options -->
      <div>
        <input type="checkbox" id="subscribe" name="newsletter" value="new" />
        <label for="subscribe">Subscribe to new newsletter</label>

        <input type="checkbox" id="oldsubscribe" name="oldNewsletter" value="old" />
        <label for="oldsubscribe">Subscribe to old newsletter</label>
      </div>

      <br />

      <!-- textarea: multi-line text input -->
      <!-- rows and cols control the size -->
      <div>
        <label for="comment">Enter Comments:</label>
        <br />
        <textarea id="comment" name="comment" rows="4" cols="40" placeholder="Write here..."></textarea>
      </div>

      <br />

      <!-- select: dropdown list -->
      <label for="cars">Choose a Car:</label>
      <select name="cars" id="cars">
        <option value="volvo">Volvo</option>
        <option value="saab">Saab</option>
        <option value="fiat">Fiat</option>
        <option value="bmw">BMW</option>
      </select>

      <br /><br />

      <!-- optgroup: group options in a dropdown -->
      <label for="animals">Choose an Animal:</label>
      <select name="animals" id="animals">
        <optgroup label="Mammals">
          <option value="dog">Dog</option>
          <option value="cat">Cat</option>
        </optgroup>
        <optgroup label="Birds">
          <option value="eagle">Eagle</option>
          <option value="parrot">Parrot</option>
        </optgroup>
      </select>

      <br /><br />

      <!-- submit button sends the form -->
      <button type="submit">Submit Form</button>

      <!-- reset button clears all inputs -->
      <button type="reset">Reset</button>

    </form>

  </body>
</html>
